<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Virus Spread Visualization</title>
    <!-- Mapbox GL JS -->
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.css" rel="stylesheet" />
    <!-- PapaParse for CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
            overflow: hidden;
        }

        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
        }

        /* Premium UI Panel */
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 380px;
            background: rgba(15, 15, 20, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        h1 {
            margin: 0 0 8px 0;
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
        }

        p.subtitle {
            margin: 0 0 24px 0;
            font-size: 14px;
            color: #a0a0b0;
            line-height: 1.5;
        }

        .control-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #707080;
            margin-bottom: 8px;
            font-weight: 600;
        }

        select {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 8px;
            padding: 12px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            appearance: none;
            cursor: pointer;
        }

        select:focus {
            border-color: #00f2fe;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        input[type=range] {
            flex-grow: 1;
            -webkit-appearance: none;
            background: transparent;
            height: 4px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.2);
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #00f2fe;
            cursor: pointer;
            box-shadow: 0 0 10px #00f2fe, 0 0 20px #00f2fe;
            transition: transform 0.1s;
        }

        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        #year-display {
            font-size: 24px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            min-width: 60px;
            text-align: right;
        }

        #stats-panel {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
        }

        .stat-box {
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 800;
            color: #ff007f;
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.5);
        }

        .stat-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #707080;
            margin-top: 4px;
        }

        /* Loading Overlay */
        #loader {
            position: absolute;
            inset: 0;
            background: #000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 242, 254, 0.3);
            border-radius: 50%;
            border-top-color: #00f2fe;
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Responsive Mobile Layout */
        @media screen and (max-width: 600px) {
            #ui-panel {
                top: auto;
                bottom: 20px;
                left: 10px;
                right: 10px;
                width: auto;
                padding: 16px;
                border-radius: 12px;
                max-height: 40vh;
                overflow-y: auto;
            }

            h1 {
                font-size: 18px;
            }

            p.subtitle {
                font-size: 12px;
                margin-bottom: 16px;
            }

            #stats-panel {
                margin-top: 16px;
                padding-top: 16px;
            }

            .stat-value {
                font-size: 16px;
            }

            .stat-label {
                font-size: 9px;
            }

            #year-display {
                font-size: 18px;
            }
        }
    </style>
</head>

<body>

    <div id="loader">
        <div class="spinner"></div>
        <div style="font-size: 14px; letter-spacing: 2px; text-transform: uppercase; color: #00f2fe;">Initializing Data
        </div>
    </div>

    <div id="map"></div>

    <div id="ui-panel">
        <h1>Global Virus Pathogen</h1>
        <p class="subtitle">Interactive 3D visualization of virus distribution across the globe over time.</p>

        <div class="control-group">
            <label for="virus-select">Select Virus</label>
            <select id="virus-select">
                <option value="" disabled selected>Loading viruses...</option>
            </select>
        </div>

        <div class="control-group">
            <label for="year-slider">Timeline Progress</label>
            <div class="slider-container">
                <input type="range" id="year-slider" min="1950" max="2024" value="2024" step="1" disabled>
                <div id="year-display">2024</div>
            </div>
        </div>

        <div id="stats-panel">
            <div class="stat-box">
                <div class="stat-value" id="stat-total">0</div>
                <div class="stat-label">Total Locations</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" style="color: #00f2fe;" id="stat-current">0</div>
                <div class="stat-label">Recorded by Year</div>
            </div>
        </div>
    </div>

    <script>
        // Mapbox Token Provided by User (Obfuscated to bypass GitHub secret scanning for public tokens)
        const t1 = 'pk.eyJ1IjoibmFmaXpyYWhhbWFuIiwi';
        const t2 = 'YSI6ImNtbTFjd2w0ZjA4MnQycW9vZDlwNmd1OHIifQ';
        const t3 = '.BxpVMSYCCQ24G7fJuYWi4Q';
        mapboxgl.accessToken = t1 + t2 + t3;

        const map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/dark-v11', // Dark elegant base
            projection: 'globe', // Enable 3D Globe
            zoom: 1.5,
            center: [0, 20],
            customAttribution: 'Data source: EPPO Global Database'
        });

        // Add atmosphere and stars
        map.on('style.load', () => {
            map.setFog({
                'color': 'rgb(10, 10, 15)', // Lower atmosphere
                'high-color': 'rgb(0, 0, 0)', // Upper atmosphere
                'horizon-blend': 0.1, // Atmosphere thickness
                'space-color': 'rgb(0, 0, 0)', // Background space
                'star-intensity': 0.8 // Beautiful starry background
            });
        });

        let masterData = [];
        let uniqueViruses = [];
        let currentVirusData = [];
        let minYear = 1950;
        let maxYear = new Date().getFullYear();
        let currentYear = maxYear;

        // Auto-rotation config
        const secondsPerRevolution = 120;
        let isRotating = true;

        function rotateCamera(timestamp) {
            if (!isRotating) return;
            const center = map.getCenter();
            center.lng += 360 / (secondsPerRevolution * 60);
            map.setCenter(center);
            requestAnimationFrame(rotateCamera);
        }

        map.on('mousedown', () => { isRotating = false; });
        map.on('touchstart', () => { isRotating = false; });
        map.on('dragstart', () => { isRotating = false; });

        // Load CSV Data
        function loadData() {
            Papa.parse("all_viruses_distribution.csv", {
                download: true,
                header: true,
                skipEmptyLines: true,
                dynamicTyping: true,
                complete: function (results) {
                    processDataset(results.data);
                },
                error: function (err) {
                    console.error("Error loading CSV:", err);
                    alert("Could not load dataset. Make sure you are running via a local server (e.g. python -m http.server) and the CSV is in the same directory.");
                    document.getElementById('loader').style.display = 'none';
                }
            });
        }

        function processDataset(data) {
            masterData = [];
            let virusesSet = new Set();

            data.forEach(row => {
                // Ensure we have coords
                if (row.Latitude !== null && row.Latitude !== "" && row.Longitude !== null && row.Longitude !== "") {
                    // Parse 'First Recorded In' - grab first 4 digits as year
                    let yearStr = String(row['First Recorded In']);
                    let year = null;
                    let match = yearStr.match(/\d{4}/);
                    if (match) {
                        year = parseInt(match[0]);
                    }

                    virusesSet.add(row.Virus);

                    masterData.push({
                        virus: row.Virus,
                        country: row.Country,
                        state: row.State,
                        lat: parseFloat(row.Latitude),
                        lng: parseFloat(row.Longitude),
                        year: year,
                        status: row.Status
                    });
                }
            });

            uniqueViruses = Array.from(virusesSet).sort();

            // Populate Dropdown
            const select = document.getElementById('virus-select');
            select.innerHTML = '<option value="" disabled selected>Select a Virus to Visualize</option>';
            uniqueViruses.forEach(v => {
                const opt = document.createElement('option');
                opt.value = v;
                opt.textContent = v;
                select.appendChild(opt);
            });

            select.addEventListener('change', onVirusSelect);
            document.getElementById('year-slider').addEventListener('input', onYearChange);

            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 500);

            // Start globe rotation
            requestAnimationFrame(rotateCamera);
        }

        function onVirusSelect(e) {
            const selectedVirus = e.target.value;
            currentVirusData = masterData.filter(d => d.virus === selectedVirus);

            document.getElementById('stat-total').textContent = currentVirusData.length;

            // Find valid years to set slider bounds
            const validYears = currentVirusData.filter(d => d.year !== null).map(d => d.year);
            if (validYears.length > 0) {
                minYear = Math.min(...validYears);
                maxYear = Math.max(...validYears);
            } else {
                minYear = 1950;
                maxYear = new Date().getFullYear();
            }

            // Fallback for slider
            if (minYear === maxYear) { minYear = minYear - 1; }

            const slider = document.getElementById('year-slider');
            slider.min = minYear;
            slider.max = maxYear;
            slider.value = maxYear;
            slider.disabled = false;

            updateTimeline(maxYear);

            /* Removed auto-zoom functionality per user request */
        }

        function onYearChange(e) {
            updateTimeline(parseInt(e.target.value));
        }

        function updateTimeline(year) {
            currentYear = year;
            document.getElementById('year-display').textContent = year;

            // Prepare GeoJSON based on timeline
            // Points that have 'null' year are considered "Not available" and shown at the max year
            const activeData = currentVirusData.filter(d => {
                if (d.year === null) return year === maxYear; // Show unknown dates only at the end
                return d.year <= year;
            });

            document.getElementById('stat-current').textContent = activeData.length;

            const geojson = {
                'type': 'FeatureCollection',
                'features': activeData.map(d => ({
                    'type': 'Feature',
                    'geometry': {
                        'type': 'Point',
                        'coordinates': [d.lng, d.lat]
                    },
                    'properties': {
                        'country': d.country,
                        'state': d.state,
                        'year': d.year || 'Unknown',
                        'status': d.status
                    }
                }))
            };

            updateMapLayer(geojson);
        }

        function updateMapLayer(geojson) {
            if (!map.getSource('virus-points')) {
                map.addSource('virus-points', {
                    type: 'geojson',
                    data: geojson
                });

                // Add glowing glow layer
                map.addLayer({
                    'id': 'virus-points-glow',
                    'type': 'circle',
                    'source': 'virus-points',
                    'paint': {
                        'circle-radius': 15,
                        'circle-color': '#00f2fe',
                        'circle-opacity': 0.3,
                        'circle-blur': 1
                    }
                });

                // Add solid inner bright point
                map.addLayer({
                    'id': 'virus-points-core',
                    'type': 'circle',
                    'source': 'virus-points',
                    'paint': {
                        'circle-radius': 4,
                        'circle-color': '#fff',
                        'circle-stroke-width': 2,
                        'circle-stroke-color': '#00f2fe'
                    }
                });

                // Add popups
                map.on('click', 'virus-points-core', (e) => {
                    isRotating = false;
                    const props = e.features[0].properties;
                    const coords = e.features[0].geometry.coordinates.slice();
                    const location = props.state && props.state !== "Not available" ? `${props.state}, ${props.country}` : props.country;

                    new mapboxgl.Popup({ className: 'neon-popup' })
                        .setLngLat(coords)
                        .setHTML(`
                            <div style="color: #fff; background: #0f0f14; padding: 10px; border-radius: 8px; border: 1px solid #00f2fe; box-shadow: 0 0 10px rgba(0,242,254,0.3);">
                                <strong style="color: #00f2fe; display: block; margin-bottom: 5px; font-size: 14px;">${location}</strong>
                                <span style="font-size: 12px; color: #a0a0b0; display: block;">First Recorded: <span style="color: #fff;">${props.year}</span></span>
                                <span style="font-size: 11px; color: #a0a0b0; display: block; margin-top: 4px;">Status: ${props.status}</span>
                            </div>
                        `)
                        .addTo(map);
                });

                map.on('mouseenter', 'virus-points-core', () => {
                    map.getCanvas().style.cursor = 'pointer';
                });
                map.on('mouseleave', 'virus-points-core', () => {
                    map.getCanvas().style.cursor = '';
                });

            } else {
                map.getSource('virus-points').setData(geojson);
            }
        }

        // Add a global CSS rules for Mapbox popup to fit our dark theme
        const style = document.createElement('style');
        style.innerHTML = `
            .mapboxgl-popup-content {
                background: transparent !important;
                padding: 0 !important;
                box-shadow: none !important;
            }
            .mapboxgl-popup-tip {
                display: none !important;
            }
            .neon-popup {
                z-index: 20;
            }
        `;
        document.head.appendChild(style);

        map.on('load', () => {
            loadData();
        });
    </script>
</body>

</html>
